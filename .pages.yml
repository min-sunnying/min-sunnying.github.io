settings:
  hide: true
  content:
    merge: true

components:
  blog_spread:
    label: Blog Page
    type: object
    fields:
      - name: kicker
        label: Kicker
        type: string
      - name: title
        label: Page Title
        type: string
      - name: image
        label: Page Image
        type: image
        options:
          media: images
      - name: alt
        label: Image Alt Text
        type: string
      - name: caption
        label: Caption
        type: text
      - name: body
        label: Page Body
        type: text

media:
  - name: images
    label: Images
    input: assets/images
    output: /assets/images
    categories: [image]
  - name: documents
    label: Documents
    input: assets/PDF
    output: /assets/PDF
    categories: [document]

content:
  - name: posts
    label: Posts
    type: collection
    path: _posts
    format: yaml-frontmatter
    subfolders: false
    view:
      fields: [title, date, categories]
      primary: title
      sort: [date, title]
      default:
        sort: date
        order: desc
    fields:
      - name: layout
        label: Layout
        type: string
        hidden: true
        default: posts
      - name: title
        label: Title
        type: string
        required: true
      - name: date
        label: Date
        type: date
        required: true
        options:
          format: yyyy-MM-dd
      - name: categories
        label: Categories
        type: select
        required: true
        options:
          multiple: true
          creatable: true
          values:
            - News
            - Projects
            - Publication
      - name: authors
        label: Authors
        type: text
      - name: journal
        label: Journal
        type: string
      - name: abstract_short
        label: Short Abstract
        type: text
      - name: thumbnail
        label: Thumbnail
        type: image
        options:
          media: images
      - name: external_link
        label: External Link
        type: string
      - name: body
        label: Content
        type: rich-text
        options:
          media: images
  - name: blog
    label: Blog Issues
    type: collection
    path: _blog
    format: yaml-frontmatter
    subfolders: false
    exclude:
      - .gitkeep
    filename: "{primary}.md"
    view:
      fields: [title, date, issue_label]
      primary: title
      sort: [date, title]
      default:
        sort: date
        order: desc
    fields:
      - name: layout
        label: Layout
        type: string
        hidden: true
        default: blog_issue
      - name: title
        label: Title
        type: string
        required: true
      - name: date
        label: Date
        type: date
        required: true
        options:
          format: yyyy-MM-dd
      - name: issue_label
        label: Issue Label
        type: string
        description: Examples: Vol. 01, Summer 2026, Notebook 03
      - name: summary
        label: Summary
        type: text
      - name: cover
        label: Cover Image
        type: image
        options:
          media: images
      - name: pdf_file
        label: PDF Issue File
        type: file
        description: If a PDF is attached, the issue will open in a page-by-page book viewer.
        options:
          media: documents
          extensions: [pdf]
      - name: spreads
        label: Pages
        description: Optional fallback when you are not using a PDF issue file.
        component: blog_spread
        list:
          collapsible:
            collapsed: true
            summary: "{fields.title} ({index})"
      - name: body
        label: Notes
        type: rich-text
        options:
          media: images
